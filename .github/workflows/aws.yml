name: Deploy to AWS

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      run: npm install
    - name: Build
      run: npm run build

    - name: Create and Configure S3 Bucket
      run: |
        aws s3api create-bucket --bucket geminiclone-e6603622 --region us-east-1 || true
        aws s3api put-public-access-block --bucket geminiclone-e6603622 --public-access-block-configuration BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false
        sleep 5 # Wait for public access block removal to propagate
        aws s3api put-bucket-policy --bucket geminiclone-e6603622 --policy '{"Version":"2012-10-17","Statement":[{"Sid":"PublicReadGetObject","Effect":"Allow","Principal":"*","Action":"s3:GetObject","Resource":"arn:aws:s3:::geminiclone-e6603622/*"}]}'
        aws s3 website s3://geminiclone-e6603622/ --index-document index.html --error-document index.html

    - name: Deploy to S3
      run: aws s3 sync ./dist s3://geminiclone-e6603622 --delete
